<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar Styles */
        nav {
            background: #1e293b;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .logo-link img {
            height: 40px;
            display: block;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #94a3b8;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #38bdf8;
        }

        /* Main Content */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2.5rem;
            padding: 2rem;
            flex-wrap: wrap;
        }

        .box {
            width: 280px;
            height: 220px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .box span {
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
        }

        /* Icon Styling */
        .box svg {
            width: 60px;
            height: 60px;
            fill: #64748b;
            transition: all 0.3s ease;
        }

        /* Hover Effects */
        .box:hover {
            transform: translateY(-12px);
            background: rgba(56, 189, 248, 0.08);
            border-color: #38bdf8;
            box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.3);
        }

        .box:hover svg {
            fill: #38bdf8;
            filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.6));
        }

        .box:hover span {
            color: white;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container { gap: 1.5rem; }
            .box { width: 100%; height: 180px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo-link">
            <img src="logo123.png" alt="Logo">
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html">About</a></li>
            <li><a href="index.html">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="box">
            <svg viewBox="0 0 24 24">
                <path d="M12 3L1 9L12 15L21 10.09V17H23V9M5 13.18V17.18L12 21L19 17.18V13.18L12 17L5 13.18Z"/>
            </svg>
            <span>Study</span>
        </div>
<a href="games.html">
        <div class="box">
            <svg viewBox="0 0 24 24">
                <path d="M21,6H3A2,2 0 0,0 1,8V16A2,2 0 0,0 3,18H21A2,2 0 0,0 23,16V8A2,2 0 0,0 21,6M6,15H4V13H2V11H4V9H6V11H8V13H6V15M14.5,15A1.5,1.5 0 0,1 13,13.5A1.5,1.5 0 0,1 14.5,12A1.5,1.5 0 0,1 16,13.5A1.5,1.5 0 0,1 14.5,15M18.5,12A1.5,1.5 0 0,1 17,10.5A1.5,1.5 0 0,1 18.5,9A1.5,1.5 0 0,1 20,10.5A1.5,1.5 0 0,1 18.5,12Z"/>
            </svg>
            <span>Gaming</span>
        </div>
    </a>
    </div>

</body>
</html>
