<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar Styles */
        nav {
            background: #1e293b;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .logo-link img {
            height: 40px;
            display: block;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #94a3b8;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #38bdf8;
        }

        /* Main Content Container */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2.5rem;
            padding: 2rem;
            flex-wrap: wrap; /* Allows stacking on small screens */
        }

        /* Link Wrapper Styling */
        .box-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .box {
            width: 280px;
            height: 220px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .box span {
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
        }

        /* Icon Styling */
        .box svg {
            width: 70px;
            height: 70px;
            fill: #64748b;
            transition: all 0.3s ease;
        }

        /* Hover Effects */
        .box:hover {
            transform: translateY(-12px);
            background: rgba(56, 189, 248, 0.08);
            border-color: #38bdf8;
            box-shadow: 0 20px 40px -15px rgba(56, 189, 248, 0.3);
        }

        .box:hover svg {
            fill: #38bdf8;
            filter: drop-shadow(0 0 12px rgba(56, 189, 248, 0.5));
        }

        .box:hover span {
            color: white;
        }

        /* Responsive adjustments */
        @media (max-width: 650px) {
            .container { 
                gap: 1.5rem; 
                align-content: center;
            }
            .box { 
                width: 100%; 
                max-width: 320px;
                height: 180px; 
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo-link">
            <img src="logo123.png" alt="Logo">
        </a>
        <ul class="nav-links">
            <li><a href="games.html">Home</a></li>
            <li><a href="About.html">About</a></li>
            <li><a href="contact.html">Contact Me</a></li>
        </ul>
    </nav>

    <main class="container">
        
        <a href="multi.html" class="box-link">
            <div class="box">
                <svg viewBox="0 0 24 24">
                    <path d="M16,13C15.71,13 15.38,13 15.03,13.05C16.19,13.89 17,15.13 17,16.5V19H23V16.5C23,14.17 18.33,13 16,13M8,13C5.67,13 1,14.17 1,16.5V19H15V16.5C15,14.17 10.33,13 8,13M8,11A3,3 0 0,0 11,8A3,3 0 0,0 8,5A3,3 0 0,0 5,8A3,3 0 0,0 8,11M16,11A3,3 0 0,0 19,8A3,3 0 0,0 16,5A3,3 0 0,0 13,8A3,3 0 0,0 16,11Z" />
                </svg>

            </div>

        <a href="singleplayer.html" class="box-link">
            <div class="box">
                <svg viewBox="0 0 24 24">

                </svg>

    </main>

</body>
</html>
