<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Pro Racer: Neon Red Rivals</title>
    <style>
        body { margin: 0; overflow: hidden; background: #001122; font-family: 'Arial Black', sans-serif; user-select: none; touch-action: manipulation; }
        
        #ui { 
            position: absolute; top: 15px; left: 15px; color: #fff; 
            font-size: 20px; text-shadow: 2px 2px 0px #000; z-index: 10;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; color: white;
            display: none;
        }

        .menu-card {
            background: #111; border: 4px solid #0ff; padding: 30px;
            text-align: center; border-radius: 15px; box-shadow: 0 0 20px #0ff;
        }

        button {
            background: #0ff; color: #000; border: none; padding: 12px 25px;
            font-size: 16px; font-weight: bold; cursor: pointer; margin: 8px;
            border-radius: 5px;
        }

        #controls {
            position: absolute; bottom: 40px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 30px;
            box-sizing: border-box; z-index: 50; pointer-events: none;
        }

        .touch-btn {
            width: 90px; height: 90px; background: rgba(0, 255, 255, 0.1);
            border: 3px solid #0ff; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; color: #0ff; 
            font-size: 40px; pointer-events: auto;
            backdrop-filter: blur(5px);
        }

        .touch-btn:active { background: rgba(0, 255, 255, 0.4); }

        #shop-btn { position: absolute; top: 15px; right: 15px; background: #ffae00; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui">
        SCORE: <span id="score">0</span><br>
        COINS: <span id="coins">0</span>
    </div>

    <button id="shop-btn" onclick="toggleShop()">SHOP</button>

    <div id="controls">
        <div class="touch-btn" id="leftBtn">◀</div>
        <div class="touch-btn" id="rightBtn">▶</div>
    </div>

    <div id="shop-menu" class="overlay">
        <div class="menu-card">
            <h1>GARAGE</h1>
            <p>Coins: <span id="shop-coins">0</span></p>
            <button onclick="buySkin(0xff00ff, 0)">Pink (0)</button><br>
            <button onclick="buySkin(0x00ffff, 100)">Cyan (100)</button><br>
            <button onclick="buySkin(0xffff00, 250)">Gold (250)</button><br>
            <button style="background:red; color:white" onclick="toggleShop()">BACK</button>
        </div>
    </div>

    <div id="death-menu" class="overlay">
        <div class="menu-card">
            <h1 style="color:#ff3300">WRECKED!</h1>
            <p>Distance: <span id="final-score">0</span>m</p>
            <button onclick="location.reload()">RETRY</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let savedCoins = localStorage.getItem('playerCoins') ? parseInt(localStorage.getItem('playerCoins')) : 0;
        let carColor = localStorage.getItem('playerColor') ? parseInt(localStorage.getItem('playerColor')) : 0xff00ff;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000511); 
        scene.fog = new THREE.Fog(0x000511, 20, 140);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- BETTER LIGHTING ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0x00ffff, 0.8);
        sun.position.set(5, 20, 10);
        scene.add(sun);

        let score = 0;
        let coins = savedCoins;
        let speed = 0.5;
        let isPaused = false;
        let isDead = false;
        const traffic = [];
        const lanes = [-2.8, 0, 2.8];
        let currentLane = 1;
        let targetX = lanes[currentLane];

        // --- PRO CAR BUILDER ---
        function createCar(color, isEnemy = false) {
            const group = new THREE.Group();
            
            // Body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(1.5, 0.5, 2.8), 
                new THREE.MeshPhongMaterial({ color: color, flatShading: true })
            );
            body.position.y = 0.25;

            // Cabin
            const cabin = new THREE.Mesh(
                new THREE.BoxGeometry(1.1, 0.5, 1.4), 
                new THREE.MeshPhongMaterial({ color: 0x111111 })
            );
            cabin.position.set(0, 0.65, -0.2);

            // Wing (Spoiler)
            const wing = new THREE.Mesh(
                new THREE.BoxGeometry(1.6, 0.1, 0.5), 
                new THREE.MeshPhongMaterial({ color: color })
            );
            wing.position.set(0, 0.7, 1.1);
            
            // Lights
            const lightColor = isEnemy ? 0xff0000 : 0x00ffff;
            const lightMat = new THREE.MeshPhongMaterial({ color: lightColor, emissive: lightColor, emissiveIntensity: 2 });
            const lLight = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.1), lightMat);
            const rLight = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 0.1), lightMat);
            lLight.position.set(0.4, 0.3, isEnemy ? 1.35 : -1.35);
            rLight.position.set(-0.4, 0.3, isEnemy ? 1.35 : -1.35);

            group.add(body, cabin, wing, lLight, rLight);
            return group;
        }

        let player = createCar(carColor);
        scene.add(player);

        // --- ENHANCED ENVIRONMENT ---
        function createChunk() {
            const chunk = new THREE.Group();
            
            // Road
            const road = new THREE.Mesh(
                new THREE.PlaneGeometry(10, 200), 
                new THREE.MeshPhongMaterial({color: 0x050505})
            );
            road.rotation.x = -Math.PI / 2; road.position.y = 0.05; 
            
            // Yellow Dashed Lines
            for(let i = -100; i < 100; i += 10) {
                const line = new THREE.Mesh(new THREE.PlaneGeometry(0.4, 5), new THREE.MeshBasicMaterial({color: 0xffcc00}));
                line.rotation.x = -Math.PI/2;
                line.position.set(0, 0.07, i);
                chunk.add(line);
            }

            // Pro Hills
            const hillGeo = new THREE.PlaneGeometry(150, 200, 40, 40);
            const v = hillGeo.attributes.position.array;
            for(let i=0; i<v.length; i+=3) {
                const x = v[i];
                const y = v[i+1];
                if(Math.abs(x) > 8) {
                    v[i+2] = Math.sin(x * 0.2) * Math.cos(y * 0.1) * 8 + (Math.random() * 0.5);
                }
            }
            hillGeo.computeVertexNormals();
            const hills = new THREE.Mesh(
                hillGeo, 
                new THREE.MeshPhongMaterial({color: 0x114422, flatShading: true})
            );
            hills.rotation.x = -Math.PI / 2;
            
            chunk.add(road, hills);
            return chunk;
        }

        let t1 = createChunk(); let t2 = createChunk();
        t2.position.z = -200; scene.add(t1, t2);

        // --- INPUT HANDLERS ---
        const moveLeft = () => { if(currentLane > 0) currentLane--; targetX = lanes[currentLane]; };
        const moveRight = () => { if(currentLane < 2) currentLane++; targetX = lanes[currentLane]; };

        window.addEventListener('keydown', (e) => {
            if(e.key === 's') toggleShop();
            if(isPaused) return;
            if(e.key === 'ArrowLeft' || e.key === 'a') moveLeft();
            if(e.key === 'ArrowRight' || e.key === 'd') moveRight();
        });

        const setupBtn = (id, fn) => {
            const el = document.getElementById(id);
            el.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                if(!isPaused) fn();
            });
        };
        setupBtn('leftBtn', moveLeft);
        setupBtn('rightBtn', moveRight);

        window.toggleShop = () => {
            if(isDead) return;
            isPaused = !isPaused;
            document.getElementById('shop-menu').style.display = isPaused ? 'flex' : 'none';
            document.getElementById('shop-coins').innerText = Math.floor(coins);
        };

        window.buySkin = (color, cost) => {
            if (coins >= cost) {
                coins -= cost;
                carColor = color;
                localStorage.setItem('playerCoins', coins);
                localStorage.setItem('playerColor', color);
                scene.remove(player);
                player = createCar(carColor);
                scene.add(player);
                document.getElementById('shop-coins').innerText = Math.floor(coins);
            }
        };

        // --- GAME LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            if (isPaused) return;

            player.position.x += (targetX - player.position.x) * 0.18;
            player.rotation.y = (targetX - player.position.x) * 0.25;
            player.rotation.z = (targetX - player.position.x) * 0.15;

            t1.position.z += speed; t2.position.z += speed;
            if(t1.position.z > 150) t1.position.z = t2.position.z - 200;
            if(t2.position.z > 150) t2.position.z = t1.position.z - 200;

            for(let i = traffic.length-1; i>=0; i--) {
                traffic[i].position.z += speed * 1.4; 
                if(Math.abs(traffic[i].position.z - player.position.z) < 2.2 && Math.abs(traffic[i].position.x - player.position.x) < 1.3) {
                    isDead = true; isPaused = true;
                    localStorage.setItem('playerCoins', Math.floor(coins));
                    document.getElementById('death-menu').style.display = 'flex';
                    document.getElementById('final-score').innerText = Math.floor(score);
                }
                if(traffic[i].position.z > 20) { scene.remove(traffic[i]); traffic.splice(i,1); }
            }

            if(Math.random() < 0.035) {
                const enemy = createCar(0xaa0000, true); // Cool Red Opponent
                enemy.position.set(lanes[Math.floor(Math.random()*3)], 0, -130);
                scene.add(enemy); traffic.push(enemy);
            }

            score += speed * 0.5; coins += speed * 0.08;
            document.getElementById('score').innerText = Math.floor(score);
            document.getElementById('coins').innerText = Math.floor(coins);
            speed += 0.00006;

            camera.position.set(player.position.x * 0.3, 6, 12);
            camera.lookAt(player.position.x * 0.6, 0, -5);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
