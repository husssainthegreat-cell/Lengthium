<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contact-container {
            width: 90%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .contact-methods {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            transition: transform 0.3s ease, border-color 0.3s ease;
            border: 1px solid transparent;
            text-decoration: none;
            color: inherit;
        }

        .contact-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            background: rgba(56, 189, 248, 0.05);
        }

        .label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            margin-bottom: 5px;
        }

        .value {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            color: var(--text-dim);
            font-size: 0.9rem;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .back-btn:hover {
            color: var(--text-main);
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .contact-container {
                padding: 30px 20px;
            }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <h1>Get in Touch</h1>
        <p>Have a question or want to work together? Feel free to reach out through any of the channels below.</p>

        <div class="contact-methods">
            <a href="mailto:husssainthegreat@gmail.com" class="contact-card">
                <span class="label">Email Me</span>
                <span class="value">husssainthegreat@gmail.com</span>
            </a>

            <div class="contact-card">
                <span class="label">Availability</span>
                <span class="value">Monday — Friday, 9am - 5pm</span>
            </div>
        </div>

        <a href="index.html" class="back-btn">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to Home
        </a>
    </div>

</body>
</html>
