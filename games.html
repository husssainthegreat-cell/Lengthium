<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lenghium Games | Free Online Games</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --nav-color: #111111;
            --accent-color: #ff4757;
            --text-color: #ffffff;
            --card-bg: #333;
            --card-hover: #444;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* FIX: This stops all links from becoming blue and underlined */
        a {
            text-decoration: none;
            color: inherit;
            display: block; /* Makes the whole area clickable */
        }

        nav {
            background-color: var(--nav-color);
            padding: 0.8rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .logo:hover {
            text-shadow: 0 0 10px var(--accent-color);
        }

        .search-bar {
            flex-grow: 0.4;
            padding: 0.6rem 1.2rem;
            border-radius: 25px;
            border: 1px solid #444;
            outline: none;
            background: #2a2a2a;
            color: white;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .search-bar:focus {
            background: #333;
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(255, 71, 87, 0.3);
        }

        .hero {
            padding: 2rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .featured-big {
            background: #000;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .featured-big img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            transition: 0.5s;
        }

        .featured-big:hover img {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .featured-info {
            position: absolute;
            bottom: 0;
            left: 0;
            padding: 30px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            width: 100%;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem 4rem 2rem;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--accent-color);
            padding-left: 15px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .game-card {
            background-color: var(--card-bg);
            aspect-ratio: 1 / 1;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.6);
            background-color: var(--card-hover);
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.3s;
        }

        .game-card:hover img {
            transform: scale(1.1);
        }

        .game-title {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            padding: 10px 5px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
        }

        @media (max-width: 768px) {
            .hero { grid-template-columns: 1fr; }
            .search-bar { display: none; }
            .featured-big { height: 250px; }
            nav { padding: 1rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">
            <div class="logo">Lenghium</div>
        </a>
        <input type="text" id="gameSearch" class="search-bar" placeholder="Search for games...">
        <div class="nav-links" style="font-weight: 600; font-size: 0.9rem; opacity: 0.8;">Play Online Games</div>
    </nav>

    <section class="hero">
        <a href="http://vectaria.io/">
            <div class="featured-big">
                <img src="minecraft.png" alt="Velocity X">
                <div class="featured-info">
                    <h2 style="margin:0;">Minecraft</h2>
                    <p style="margin: 5px 0 0 0; opacity: 0.8;">You will play online minecraft without dowloading or buying.</p>
                </div>
            </div>
        </a>

        <a href="https://word-quest-galore.lovable.app">
            <div class="game-card" style="height: 100%;">
                <img src="diw.png" alt="Word Finder">
                <div class="game-title">Word Finder</div>
            </div>
        </a>
    </section>

    <div class="container">
        <h3 class="section-title">Popular Games</h3>
        <div class="game-grid" id="gameGrid">

            <a href="g.html" class="game-item">
                <div class="game-card">
                    <img src="dimple.png" alt="Dimple Car">
                    <div class="game-title">Dimple Car</div>
                </div>
            </a>

            <a href="qwe.html" class="game-item">
                <div class="game-card">
                    <img src="legact666.png" alt="Water Sorter">
                    <div class="game-title">Water Sorter</div>
                </div>
            </a>

            <a href="adq.html" class="game-item">
                <div class="game-card">
                    <img src="diq.png" alt="Chess">
                    <div class="game-title">Chess</div>
                </div>
            </a>
<a href="exp.html">
            <div class="game-item">
                <div class="game-card">
                    <img src="tic.png" alt="Tic Tac Toe">
                    <div class="game-title">Tic Tac Toe</div>
                </div>
            </div>
</a>
<a href="asqw.html">
            <div class="game-item">
                <div class="game-card">
                    <img src="candy.png" alt="Brain Test">
                    <div class="game-title">Fruit Crush</div>
                </div>
            </div>
        </a>
<a href="ccc.html">
            <div class="game-item">
                <div class="game-card">
                    <img src="difer.png" alt="Vectaria.io">
                    <div class="game-title">Bublee Shooter</div>
                </div>
            </div>
        </a>
<a href="car.html">
            <div class="game-item">
                <div class="game-card">
                    <img src="car.png" alt="Monkey Mart">
                    <div class="game-title">2D Car</div>
                </div>
            </div>
</a>
              

    <script>
        // Search functionality
        const searchInput = document.getElementById('gameSearch');
        const gameItems = document.querySelectorAll('.game-item');

        searchInput.addEventListener('input', () => {
            const filter = searchInput.value.toLowerCase();
            
            gameItems.forEach(item => {
                const title = item.querySelector('.game-title').innerText.toLowerCase();
                if (title.includes(filter)) {
                    item.style.display = "block";
                } else {
                    item.style.display = "none";
                }
            });
        });
    </script>

</body>
</html>
